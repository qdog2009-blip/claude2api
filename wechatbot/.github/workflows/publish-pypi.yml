name: Publish to PyPI

on:
  push:
    tags:
      - "py-v*" # Trigger on tags like py-v0.1.0

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (upload to TestPyPI instead)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write # Required for trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    environment:
      name: ${{ inputs.dry_run == 'true' && 'testpypi' || 'pypi' }}
      url: ${{ inputs.dry_run == 'true' && 'https://test.pypi.org/p/wechatbot-sdk' || 'https://pypi.org/p/wechatbot-sdk' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install build hatchling

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build package
        run: python -m build

      - name: Verify package
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to TestPyPI (dry run)
        if: inputs.dry_run == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: inputs.dry_run != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
